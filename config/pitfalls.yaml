# 避坑清单：生成 HTML 时严格禁止的问题
# 渐进式完善：只在测试中发现问题时才添加

version: 1.0
last_updated: 2026-03-13

# ============================================
# 编码问题（最高优先级）
# ============================================
encoding:
  - "必须包含 <meta charset='UTF-8'> 声明"
  - "禁止使用中文文件名（只用英文 + 短横线命名）"
  - "禁止在 HTML 代码中出现乱码字符（如，锟斤拷等）"

# ============================================
# HTML 结构问题
# ============================================
html_structure:
  - "必须是完整的 HTML5 文档结构（以 <!DOCTYPE html> 开头）"
  - "必须包含 <html>, <head>, <body> 三个根标签"
  - "<title> 标签不能为空，需填写有意义的标题"
  - "viewport meta 标签必须存在（移动端适配）"

# ============================================
# CSS 问题
# ============================================
css:
  - "禁止使用未定义的 CSS 变量"
  - "禁止引用不存在的外部 CSS 文件（会导致 404）"
  - "Tailwind CDN 链接必须使用完整版（不是精简版）"
  - "如果使用 Google Fonts，链接必须正确且可访问"
  - "避免使用 position: fixed，除非必要（会遮挡内容）"

# ============================================
# JavaScript 问题
# ============================================
javascript:
  - "禁止出现语法错误（括号匹配、引号闭合、分号结尾）"
  - "禁止引用不存在的 JS 文件"
  - "可以有 console.log，但不能有 debugger 语句"
  - "如果使用 Framer Motion 等库，必须正确引入 CDN"
  - "事件监听器必须确保 DOM 加载后再绑定"

# ============================================
# 资源引用问题
# ============================================
assets:
  - "图片优先使用占位图服务（如 placehold.co, unsplash.com）"
  - "禁止引用可能失效的外部图片链接（如微博、微信图片）"
  - "SVG 可以内联，不要用外部 .svg 文件"
  - "图标优先使用 SVG 内联或 FontAwesome CDN"

# ============================================
# 可访问性问题
# ============================================
accessibility:
  - "所有交互元素必须有 aria-label 或可访问名称"
  - "表单输入必须关联 label 标签（使用 for/id 关联）"
  - "按钮和链接必须有明确的点击区域"

# ============================================
# 响应式问题
# ============================================
responsive:
  - "不能只有桌面端样式，必须有媒体查询（@media）"
  - "按钮和链接的点击区域至少 44px × 44px"
  - "不能在移动端出现横向滚动条（除非是表格组件）"
  - "字体大小不能小于 12px（移动端可读性）"

# ============================================
# 业务逻辑问题
# ============================================
business_logic:
  - "登录页必须有密码输入框（不能只有邮箱/手机号）"
  - "表格必须有表头（<thead> 包含 <th>）"
  - "分页组件必须有'上一页/下一页'按钮"
  - "表单必须有提交按钮（type='submit'）"
  - "复选框必须使用 <label> 包裹或正确关联 id（防止点不了）"
  - "导航菜单必须能点击（href 不为空）"

# ============================================
# 布局与样式问题
# ============================================
layout:
  - "标签云必须使用 flex-wrap: wrap，防止标签重叠"
  - "卡片容器必须设置 max-width，防止内容过宽"
  - "长文本必须设置 word-break 或 overflow-wrap，防止溢出"
  - "多列布局在小屏幕上必须堆叠（不能并排显示）"

# ============================================
# 当前已知问题（持续更新）
# ============================================
known_issues: []
